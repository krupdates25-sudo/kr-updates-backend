# =============================================================================
# Deploy Backend to EC2 - GitHub Actions Workflow
# =============================================================================

name: Deploy Backend to EC2

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  NODE_VERSION: "18"

jobs:
  # ===========================================================================
  # TEST JOB
  # ===========================================================================
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm run test:ci

  # ===========================================================================
  # DEPLOY JOB
  # ===========================================================================
  deploy:
    name: Deploy to EC2
    needs: test
    runs-on: ubuntu-latest

    steps:
      # -------------------------------------------------------
      # Check if EC2 SSH port is reachable
      # -------------------------------------------------------
      - name: Test SSH connectivity
        run: |
          nc -vz ${{ secrets.EC2_HOST }} 22

      # -------------------------------------------------------
      # Deploy application
      # -------------------------------------------------------
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}

          username: ${{ secrets.EC2_USER }}

          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}

          passphrase: ${{ secrets.EC2_SSH_PASSPHRASE }}

          port: 22

          script: |
            set -e

            cd /home/ubuntu/kr-updates-backend

            git fetch origin main

            git reset --hard origin/main

            git log -1 --oneline

            npm ci --omit=dev

            pm2 delete kr-updates-backend 2>/dev/null || true

            pm2 start ecosystem.config.js

            pm2 save
